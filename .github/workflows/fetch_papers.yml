name: Fetch TTS Papers

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Full historical fetch (true|false)"
        required: false
        default: "false"

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        # Pinned: apt ships 3.1.x, which renders math differently from the
        # version the conversion tests are written against.
        env:
          PANDOC_VERSION: "3.9.0.2"
        run: |
          curl -sSL -o /tmp/pandoc.deb "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        # The fetch/convert scripts format their generated markdown with the
        # repo-pinned Prettier, so it must be installed before they run.
        run: npm ci

      - name: Restore conversion cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/source
            .cache/citations.json
          key: convert-cache-${{ github.run_id }}
          restore-keys: convert-cache-

      - name: Fetch papers (incremental or full)
        run: |
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            uv run python scripts/fetch_papers.py --full
          else
            uv run python scripts/fetch_papers.py
          fi

      - name: Convert papers to markdown
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_REMEDIATION_MAX_PAPERS: "50"
        run: |
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            uv run python scripts/convert_papers.py --regenerate-all
          else
            uv run python scripts/convert_papers.py
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/ papers.csv README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update papers and markdown [skip ci]"
            git push
          fi
